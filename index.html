<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMC DB_Docu</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Noto+Serif+KR:wght@300;400;600&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }

/* ═══════════════════════════════
   PHASE 0 — 닫힌 서랍 (갈색 방)
   ═══════════════════════════════ */
#room {
  position:fixed; inset:0; z-index:1000;
  background: #2a1c0a;
  background-image:
    radial-gradient(ellipse at 50% 30%, #3a2810 0%, transparent 60%),
    radial-gradient(ellipse at 20% 80%, #1e1208 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, #251808 0%, transparent 50%);
  display:flex; align-items:center; justify-content:center;
  cursor:default;
  transition: opacity 0.8s ease;
}

/* 나무 바닥 텍스처 */
#room::before {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(
    2deg,
    transparent 0px, transparent 38px,
    rgba(0,0,0,0.08) 38px, rgba(0,0,0,0.08) 40px
  );
  pointer-events:none;
}

/* 상단 빛 */
#room::after {
  content:''; position:absolute;
  top:0; left:20%; right:20%; height:40%;
  background: radial-gradient(ellipse at 50% 0%, rgba(180,140,60,0.06) 0%, transparent 70%);
  pointer-events:none;
}

/* ── 서랍장 ── */
.cabinet {
  cursor:pointer;
  transition: transform 0.1s ease;
}
.cabinet:hover { transform: translateY(-2px); }
.cabinet:active { transform: translateY(1px); }

.cab-body {
  width: 320px;
  background: #3a2810;
  border: 1px solid #5a3818;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7);
  padding: 14px;
}

/* 메인 서랍 */
.drawer-closed {
  width: 100%;
  height: 64px;
  background: #141008;
  border: 1px solid #3a2510;
  margin-bottom: 10px;
  position: relative;
}
.drawer-face {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 28px;
  background: #2a1c0a;
  border-top: 1px solid #4a3018;
  display: flex;
  align-items: center;
  justify-content: center;
}
.drawer-handle {
  width: 64px;
  height: 7px;
  background: #6a4a14;
  border: 1px solid #8a6828;
}

/* 작은 서랍 */
.drawer-small {
  width: 100%;
  height: 42px;
  background: #141008;
  border: 1px solid #3a2510;
  position: relative;
}
.drawer-small-face {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 22px;
  background: #2a1c0a;
  border-top: 1px solid #4a3018;
  display: flex;
  align-items: center;
  justify-content: center;
}
.drawer-small-handle {
  width: 44px;
  height: 6px;
  background: #4a3810;
  border: 1px solid #6a5020;
}

/* 클릭 힌트 */
.click-hint {
  margin-top: 20px;
  text-align: center;
  font-family: 'Courier Prime', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(180,140,70,0.3);
  text-transform: uppercase;
  animation: hintPulse 2.5s ease-in-out infinite;
}
@keyframes hintPulse {
  0%,100%{ opacity:0.3; } 50%{ opacity:0.7; }
}

/* ═══════════════════════════════
   PHASE 1 — 서랍 열림 + 파일 플립
   ═══════════════════════════════ */
#intro {
  position:fixed; inset:0; z-index:999;
  background:#0a0704;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  opacity:0;
  pointer-events:none;
}

#intro.active {
  pointer-events:auto;
}

#intro::before {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:2;
  background: radial-gradient(ellipse at 50% 40%, transparent 15%, rgba(3,2,1,0.92) 100%);
}

.wm {
  position:absolute; top:24px; left:50%; transform:translateX(-50%);
  font-family:'Special Elite',cursive; font-size:9px; letter-spacing:0.38em;
  color:rgba(180,150,80,0.14); text-transform:uppercase; white-space:nowrap;
  z-index:3; pointer-events:none;
}

.scene {
  position:relative; z-index:1;
  width:100vw; height:100vh;
  transform: perspective(900px) rotateX(38deg) translateY(-8vh);
  transform-style:preserve-3d;
}
.cab-surface {
  position:absolute; inset:0;
  background: linear-gradient(175deg, #3c2c14 0%, #2a1e0c 50%, #1c1208 100%);
  border-top: 3px solid #6a4820;
  border-bottom: 3px solid #1a0e06;
}
.cab-surface::before {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(87deg,
    transparent 0px, transparent 28px,
    rgba(80,50,10,0.09) 28px, rgba(80,50,10,0.09) 29px);
}
.cab-surface::after {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, #3a2510, #8a6030, #5a4020, #8a6030, #3a2510);
}
.slot {
  position:absolute;
  top:5vh; left:8vw; right:8vw; bottom:5vh;
  background:#050301;
  border-left:2px solid #4a3018; border-right:2px solid #4a3018;
  overflow:hidden;
  box-shadow: inset 0 12px 40px rgba(0,0,0,0.95), inset 0 -4px 20px rgba(0,0,0,0.7);
}
.slot::before {
  content:''; position:absolute; top:0; left:0; right:0; height:4px; z-index:2;
  background: linear-gradient(90deg, #2a1808, #7a5028, #4a3018, #7a5028, #2a1808);
}
.files-area { position:absolute; inset:0; overflow:hidden; }
.handle-bar {
  position:absolute; bottom:0; left:0; right:0; height:32px; z-index:10;
  background:linear-gradient(180deg, #3a2818 0%, #241a0e 100%);
  border-top:2px solid #6a4828;
  display:flex; align-items:center; justify-content:center;
}
.handle-knob {
  width:120px; height:12px;
  background:linear-gradient(180deg, #141008 0%, #241a0e 100%);
  border:1px solid #8a6030; border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.6), inset 0 1px 2px rgba(200,160,60,0.1);
}

/* 파일 카드 */
.f {
  position:absolute; left:0; right:0; height:44px;
  display:flex; align-items:center; padding:0 28px;
  cursor:default; will-change:top;
  border-top:1px solid rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(0,0,0,0.35);
}
.f-tab {
  position:absolute; top:0; left:24px;
  width:90px; height:13px; border-radius:3px 3px 0 0; opacity:0.9;
}
.f-label-wrap { display:flex; align-items:center; gap:16px; margin-left:16px; }
.f-code {
  font-family:'Special Elite',cursive;
  font-size:11px; letter-spacing:0.16em; text-transform:uppercase; opacity:0.75;
}
.f-name {
  font-family:'Courier Prime',monospace;
  font-size:9px; letter-spacing:0.1em; text-transform:uppercase; opacity:0.38;
}
.f::after {
  content:''; position:absolute; right:28px; top:50%; transform:translateY(-50%);
  width:30%; height:1px;
  background:repeating-linear-gradient(90deg, rgba(150,120,60,0.18) 0px, rgba(150,120,60,0.18) 4px, transparent 4px, transparent 8px);
}
.f.target { cursor:pointer; }
.f.target:hover { filter:brightness(1.18); box-shadow:0 0 50px rgba(220,200,120,0.3), inset 0 0 20px rgba(220,200,100,0.06); }
.f.target:active { filter:brightness(0.9); }

.hint {
  position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
  font-family:'Courier Prime',monospace; font-size:9px; letter-spacing:0.2em;
  color:rgba(200,180,130,0); text-transform:uppercase; white-space:nowrap; z-index:10;
  transition:color 0.8s ease; pointer-events:none;
}
.hint.show { color:rgba(200,180,130,0.5); }

@keyframes df {
  0%{opacity:0.8;transform:translateY(0) translateX(0);}
  100%{opacity:0;transform:translateY(-60px) translateX(var(--dx));}
}
.dust{position:absolute;border-radius:50%;background:rgba(200,170,90,0.65);pointer-events:none;opacity:0;}

/* ═══════════════════════════════
   FADE OVERLAY
   ═══════════════════════════════ */
#fadeOverlay {
  position:fixed; inset:0; z-index:9000;
  background:#0a0704; opacity:0; pointer-events:none;
  transition:opacity 0.6s ease;
}
#fadeOverlay.fade-in { opacity:1; pointer-events:auto; }

/* ═══════════════════════════════
   PHASE 2 — 문서 (던져지는 등장)
   ═══════════════════════════════ */
#doc { display:none; }

/* 문서 throw-in 애니메이션 */
@keyframes throwIn {
  0%   { transform: translateY(100px) scale(0.88); opacity:0; }
  55%  { transform: translateY(-10px) scale(1.02); opacity:1; }
  75%  { transform: translateY(4px) scale(0.99); }
  90%  { transform: translateY(-2px) scale(1.003); }
  100% { transform: translateY(0) scale(1); opacity:1; }
}


  :root {
    --paper:      #e8dfc8;
    --paper-dark: #d9ceb0;
    --paper-edge: #c8b990;
    --ink:        #2a200e;
    --ink-faded:  #5a4a30;
    --ink-dim:    #8a7050;
    --ink-ghost:  #b8a880;
    --red-stamp:  #8a2010;
    --shadow:     rgba(30,18,5,0.28);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }


  /* ── PAGE COUNTER ── */
  .page-indicator {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    color: rgba(200,180,130,0.55);
    letter-spacing: 0.14em;
    flex-shrink: 0;
  }

  .page-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    border: 1px solid rgba(200,180,130,0.4);
    background: transparent;
    cursor: pointer;
    transition: all 0.25s;
  }
  .page-dot.active {
    background: rgba(200,180,130,0.6);
    border-color: rgba(200,180,130,0.7);
  }

  /* ── FLIPBOOK VIEWPORT ── */
  .flipbook {
    width: 100%;
    max-width: 680px;
    flex: 1;
    min-height: 0;
    position: relative;
    perspective: 1200px;
    perspective-origin: center center;
  }

  /* ── PAPER SHEET ── */
  .paper {
    background: var(--paper);
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 27px,
        rgba(150,120,50,0.05) 27px, rgba(150,120,50,0.05) 28px
      ),
      radial-gradient(ellipse at 8%  4%,  rgba(190,155,65,0.18) 0%, transparent 30%),
      radial-gradient(ellipse at 92% 7%,  rgba(145,115,42,0.12) 0%, transparent 26%),
      radial-gradient(ellipse at 50% 96%, rgba(165,125,32,0.15) 0%, transparent 35%),
      radial-gradient(ellipse at 4%  55%, rgba(175,135,52,0.10) 0%, transparent 26%);
    width: 100%;
    height: 100%;
    padding: 30px 52px 36px;
    position: absolute;
    top: 0; left: 0;
    overflow-y: auto;
    box-shadow:
      0 2px 8px  var(--shadow),
      0 12px 36px var(--shadow),
      inset 0 0 80px rgba(140,110,30,0.07);
    transform-origin: left center;
    backface-visibility: hidden;
  }

  /* thin scrollbar inside paper */
  .paper::-webkit-scrollbar { width: 4px; }
  .paper::-webkit-scrollbar-track { background: transparent; }
  .paper::-webkit-scrollbar-thumb { background: rgba(90,70,30,0.25); border-radius: 2px; }

  /* binding edge */
  .paper::before {
    content: '';
    position: absolute;
    left:0; top:0; bottom:0;
    width: 5px;
    background: linear-gradient(180deg,
      var(--paper-edge) 0%, var(--paper-dark) 40%,
      var(--paper-edge) 75%, var(--paper-dark) 100%);
    opacity: 0.5;
  }

  /* punch holes */
  .paper::after {
    content: '';
    position: absolute;
    left: 24px; top: 86px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(95,72,28,0.16);
    box-shadow:
      0 190px 0 rgba(95,72,28,0.12),
      0 380px 0 rgba(95,72,28,0.12),
      0 570px 0 rgba(95,72,28,0.08);
  }

  /* ── PAGE STATES ── */

  /* 기본: page1 앞, page2 오른쪽에 살짝 삐져나옴 */
  #page1 {
    z-index: 2;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1),
                opacity   0.5s ease,
                clip-path 0.6s cubic-bezier(0.4,0,0.2,1),
                filter    0.5s ease;
    transform: translateX(0) rotate(-0.6deg);
    transform-origin: bottom right;
    opacity: 1;
    pointer-events: auto;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
    filter: none;
  }

  #page2 {
    z-index: 1;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1),
                opacity   0.5s ease,
                filter    0.5s ease;
    transform: translateX(20px) rotate(0.9deg) scale(0.975);
    transform-origin: bottom right;
    opacity: 0.5;
    pointer-events: none;
    filter: brightness(0.68);
  }

  /* flipped: page1을 오른쪽 아래 대각선으로 쓸어내고 page2가 올라옴 */
  .flipped #page1 {
    z-index: 1;
    transform: translateX(60%) translateY(30%) rotate(18deg);
    clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
    opacity: 0;
    pointer-events: none;
    filter: brightness(0.5);
  }

  .flipped #page2 {
    z-index: 2;
    transform: translateX(0) scale(1);
    opacity: 1;
    pointer-events: auto;
    filter: none;
  }

  /* flipped일 때 page1 대신 뒤에 살짝 보이는 건 없어도 되므로 생략 */

  /* ── NAV BUTTONS ── */
  .nav-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 6px;
    flex-shrink: 0;
    padding-bottom: 4px;
  }

  .nav-btn {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: rgba(200,180,130,0.7);
    background: transparent;
    border: 1px solid rgba(200,180,130,0.28);
    padding: 7px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .nav-btn:hover:not(:disabled) {
    color: rgba(200,180,130,1);
    border-color: rgba(200,180,130,0.6);
    background: rgba(200,180,130,0.06);
  }

  .nav-btn:disabled {
    opacity: 0.2;
    cursor: default;
  }

  .nav-label {
    font-family: 'Courier Prime', monospace;
    font-size: 9.5px;
    color: rgba(200,180,130,0.4);
    letter-spacing: 0.1em;
    min-width: 80px;
    text-align: center;
  }

  /* ════════════════════════════
     DOCUMENT STYLES
  ════════════════════════════ */

  .doc-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
    gap: 12px;
  }

  .org-name {
    font-family: 'Special Elite', cursive;
    font-size: 10.5px;
    color: var(--ink-faded);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    line-height: 1.7;
  }

  .doc-ref {
    font-family: 'Courier Prime', monospace;
    font-size: 9.5px;
    color: var(--ink-dim);
    text-align: right;
    letter-spacing: 0.06em;
    line-height: 1.9;
  }

  .rule-double {
    border: none; height: 5px;
    border-top: 2px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    margin: 10px 0 14px;
    opacity: 0.65;
  }

  .rule-single {
    border: none;
    border-top: 1px solid var(--ink-dim);
    margin: 11px 0;
    opacity: 0.45;
  }

  .doc-title-block { text-align:center; margin-bottom:16px; }

  .doc-title {
    font-family: 'Special Elite', cursive;
    font-size: 16.5px;
    color: var(--ink);
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .doc-subtitle {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    color: var(--ink-faded);
    letter-spacing: 0.13em;
    margin-top: 5px;
  }

  .disclaimer {
    border: 1px solid var(--ink-dim);
    padding: 7px 14px;
    margin-bottom: 24px;
    text-align: center;
    font-size: 9.5px;
    color: var(--ink-faded);
    letter-spacing: 0.07em;
    font-style: italic;
    background: rgba(130,100,35,0.04);
    line-height: 1.7;
  }

  .section-heading {
    font-family: 'Special Elite', cursive;
    font-size: 11.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 11px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(90,70,30,0.35);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .sec-code {
    font-family: 'Courier Prime', monospace;
    font-size: 8.5px;
    color: var(--ink-ghost);
    letter-spacing: 0.07em;
    font-weight: normal;
  }

  /* ── PROFILE BLOCK ── */
  .profile-block {
    display: grid;
    grid-template-columns: 1fr 150px;
    gap: 22px;
    margin-bottom: 4px;
    position: relative;
  }

  @media (max-width: 540px) {
    .profile-block { grid-template-columns: 1fr; }
    .profile-img-col { display: none; }
    .paper { padding: 36px 26px 50px; }
  }

  .tw-table { width:100%; border-collapse:collapse; font-size:11.5px; }
  .tw-table tr { border-bottom: 1px dotted rgba(90,70,30,0.22); }
  .tw-table tr:last-child { border-bottom: none; }
  .tw-table td { padding: 5px 4px; vertical-align:top; color:var(--ink); line-height:1.55; }
  .tw-table td:first-child {
    font-size: 9.5px;
    color: var(--ink-faded);
    width: 128px;
    letter-spacing: 0.05em;
    padding-right: 10px;
    white-space: nowrap;
  }
  .tw-table td:first-child::after { content:' . . .'; opacity:0.28; }

  /* ── FLOATING PHOTO ── */
  .floating-photo-wrap {
    position: absolute;
    top: -18px; right: -22px;
    width: 170px;
    z-index: 20;
    transform: rotate(4deg);
    filter: drop-shadow(3px 5px 10px rgba(20,12,3,0.45));
    pointer-events: none;
  }

  .floating-photo-tape {
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    width: 52px; height: 18px;
    background: rgba(210,190,130,0.55);
    border: 1px solid rgba(160,140,80,0.4);
    z-index: 21;
  }

  .floating-photo-border {
    border: 6px solid #f0e8d0;
    border-bottom-width: 22px;
    background: #f0e8d0;
    box-shadow: inset 0 0 0 1px rgba(130,100,40,0.18), 2px 2px 0 rgba(130,100,40,0.12);
  }

  .floating-photo-border img {
    width: 100%; display: block;
    filter: sepia(0.25) contrast(1.02);
  }

  .floating-photo-caption {
    text-align: center;
    font-family: 'Courier Prime', monospace;
    font-size: 7.5px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    margin-top: 3px;
    padding-bottom: 2px;
  }

  /* ── STAMP ── */
  .stamp-wrap {
    position: absolute;
    top: 6px; right: 8px;
    transform: rotate(-15deg);
    opacity: 0.62;
    pointer-events: none;
    z-index: 30;
  }

  .stamp-outer {
    width: 84px; height: 84px;
    border: 3px solid var(--red-stamp);
    border-radius: 50%;
    display: flex; align-items:center; justify-content:center;
  }

  .stamp-inner {
    width: 72px; height: 72px;
    border: 1px solid var(--red-stamp);
    border-radius: 50%;
    display: flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap: 2px;
  }

  .stamp-text {
    font-family: 'Special Elite', cursive;
    font-size: 11px;
    color: var(--red-stamp);
    letter-spacing: 0.1em;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.35;
  }

  .stamp-sub {
    font-family: 'Courier Prime', monospace;
    font-size: 6.5px;
    color: var(--red-stamp);
    letter-spacing: 0.13em;
  }

  /* ── BODY TEXT ── */
  .body-text { font-size:11.5px; color:var(--ink); line-height:1.85; margin-bottom:12px; }
  .body-text p { margin-bottom:9px; }
  .body-text p:last-child { margin-bottom:0; }

  /* ── METER ── */
  .meter-wrap { margin: 10px 0; }
  .meter-label {
    display: flex; justify-content:space-between;
    font-size:9.5px; color:var(--ink-dim);
    margin-bottom:4px; letter-spacing:0.06em;
  }
  .meter-track {
    height: 9px;
    background: repeating-linear-gradient(90deg,
      rgba(90,70,30,0.13) 0px, rgba(90,70,30,0.13) 6px,
      transparent 6px, transparent 9px);
    border: 1px solid var(--ink-dim);
    overflow: hidden;
  }
  .meter-fill {
    height: 100%;
    background: repeating-linear-gradient(90deg,
      var(--ink-faded) 0px, var(--ink-faded) 6px,
      rgba(90,70,30,0.15) 6px, rgba(90,70,30,0.15) 9px);
    width: 0%;
    transition: width 1.5s cubic-bezier(0.4,0,0.2,1) 0.5s;
  }

  /* ── NOTE BOX ── */
  .note-box {
    border: 1px solid rgba(90,70,30,0.3);
    padding: 10px 14px; margin: 12px 0;
    background: rgba(130,100,30,0.04);
    font-size: 10.5px; color:var(--ink-faded);
    line-height: 1.82; font-style:italic;
  }
  .note-by {
    display:block; font-style:normal;
    font-size:9px; color:var(--ink-ghost);
    letter-spacing:0.09em; margin-bottom:6px;
  }

  /* ── ARTIFACT ── */
  .artifact-header {
    font-family: 'Special Elite', cursive;
    font-size: 10.5px; color:var(--ink);
    letter-spacing: 0.13em; margin-bottom:9px;
    display:flex; align-items:baseline; gap:10px;
  }
  .artifact-grade {
    font-family: 'Courier Prime', monospace;
    font-size:8.5px; border:1px solid var(--ink-dim);
    padding:1px 7px; color:var(--ink-faded); letter-spacing:0.1em;
  }

  /* ── TAGS ── */
  .tag {
    display:inline-block; font-family:'Courier Prime',monospace;
    font-size:8.5px; letter-spacing:0.1em;
    padding:1px 7px; border:1px solid; vertical-align:middle;
  }
  .tag-reject { border-color:var(--red-stamp); color:var(--red-stamp); }
  .tag-warn   { border-color:var(--ink-dim);   color:var(--ink-faded); }

  /* ── UNDERLINE ── */
  .u {
    text-decoration: underline;
    text-decoration-color: var(--ink-faded);
    text-underline-offset: 2px;
  }

  /* ── OPINION ── */
  .opinion-block {
    margin: 14px 0; padding: 14px 18px;
    border: 1px solid rgba(90,70,30,0.32);
    font-size: 11.5px; color:var(--ink);
    line-height: 1.9; position:relative;
  }
  .opinion-block::before {
    content: 'EVALUATION REMARKS';
    position: absolute; top:-9px; left:14px;
    background: var(--paper); padding: 0 6px;
    font-family: 'Courier Prime',monospace;
    font-size: 8px; color:var(--ink-ghost); letter-spacing:0.13em;
  }

  /* ── EVAL TABLE ── */
  .eval-table { width:100%; border-collapse:collapse; font-size:11px; margin-top:12px; }
  .eval-table td {
    padding:6px 9px; vertical-align:top;
    border:1px solid rgba(90,70,30,0.22);
    color:var(--ink); line-height:1.62;
  }
  .eval-table td:first-child {
    width:128px; font-size:9.5px;
    color:var(--ink-faded); letter-spacing:0.04em;
    background:rgba(130,100,40,0.055);
  }

  /* ── INDENT ── */
  .indent-block { margin:12px 0 12px 26px; font-size:11px; color:var(--ink-faded); line-height:1.9; }

  /* ── FOOTER ── */
  .doc-footer {
    margin-top: 30px; padding-top:10px;
    border-top: 1px solid var(--ink-dim);
    display:flex; justify-content:space-between;
    flex-wrap:wrap; gap:8px;
  }
  .footer-col { font-size:8.5px; color:var(--ink-ghost); letter-spacing:0.08em; line-height:1.85; }
  .footer-col.right { text-align:right; }

  /* ── PAGE NUMBER watermark ── */
  .page-num-watermark {
    position: absolute;
    bottom: 22px; right: 64px;
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    color: var(--ink-ghost);
    letter-spacing: 0.12em;
    opacity: 0.6;
  }

  /* ── CONTINUATION HEADER (page 2) ── */
  .continuation-header {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    color: var(--ink-ghost);
    letter-spacing: 0.1em;
    margin-bottom: 18px;
    padding-bottom: 6px;
    border-bottom: 1px dotted rgba(90,70,30,0.25);
    display: flex;
    justify-content: space-between;
  }

  .section { margin-bottom:26px; }
  strong { color:var(--ink); }
  em { font-style:normal; font-family:'Courier Prime',monospace; font-size:10.5px; color:var(--ink-faded); }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:#3a2c10; }
  ::-webkit-scrollbar-thumb { background:#6a5030; border-radius:3px; }


/* doc 전환 시 body 레이아웃 */
body.doc-mode {
  background:#4a3820;
  background-image:
    radial-gradient(ellipse at 25% 15%,#5e4a2a 0%,transparent 55%),
    radial-gradient(ellipse at 78% 88%,#3a2c10 0%,transparent 50%);
  height:100vh; overflow:hidden;
  font-family:'Courier Prime','Courier New',monospace;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:14px 60px 14px; user-select:none;
}
</style>

<script>
/* ══ 서랍 열기 ══ */
function openDrawer() {
  var room  = document.getElementById('room');
  var intro = document.getElementById('intro');

  // 클릭으로 오디오 언락 (두 오디오 모두)
  ['introFlipSound','pageFlipSound'].forEach(function(id){
    var s = document.getElementById(id);
    if(!s) return;
    s.volume=0.001;
    s.play().then(function(){ s.pause(); s.currentTime=0; s.volume=1; }).catch(function(){});
  });

  // 서랍 열리는 애니메이션 — room 페이드아웃, intro 페이드인
  room.style.transition = 'opacity 0.5s ease';
  room.style.opacity = '0';
  room.style.pointerEvents = 'none';

  intro.style.transition = 'opacity 0.6s ease';
  intro.classList.add('active');

  setTimeout(function(){
    intro.style.opacity = '1';
    room.style.display = 'none';
    // 먼지 + 파일 플립 시작
    spawnDust();
    // 소리 재생
    var flipSnd = document.getElementById('introFlipSound');
    if(flipSnd){ flipSnd.currentTime=0; flipSnd.playbackRate=1.5; flipSnd.play().catch(function(){}); }
    setTimeout(flipFiles, 180);
  }, 400);
}

/* ══ 파일 데이터 (150개) ══ */
var COLORS=[
  ['#7a6040','#9a8060'],['#5a4228','#7a6248'],['#7c6442','#9c8462'],
  ['#503c20','#705c40'],['#624e2c','#826e4c'],['#6e5838','#8e7858'],
  ['#584430','#786450'],['#704e2a','#906e4a'],['#4e3c1e','#6e5c3e'],
  ['#663e1e','#865e3e'],['#6a5438','#8a7458'],['#7a5030','#9a7050'],
  ['#4a3820','#6a5840'],['#5c4428','#7c6448'],['#683e1c','#885e3c'],
  ['#4c3a1a','#6c5a3a'],['#7e5832','#9e7852'],['#523e20','#725e40'],
];
var PREFIXES=['HR','OR','SEC','MRA','IR','ADM','SPC'];
var CATS={HR:'인사 보고서',OR:'조직 규정',SEC:'보안 문서',MRA:'마도구 연구',IR:'정보 자원',ADM:'행정 문서',SPC:'특수 임무'};
var TGT=114, FH=44;

var FD=[];
var num=1;
for(var i=0;i<150;i++){
  if(i===TGT){ FD.push(['#e8dfc8','#c8b990','HR-47','인사 보고서',true]); continue; }
  var p=PREFIXES[i%PREFIXES.length];
  var c=COLORS[i%COLORS.length];
  FD.push([c[0],c[1],p+'-'+String(num).padStart(3,'0'),CATS[p]]);
  num++;
}

var area=document.getElementById('filesArea'), els=[];
FD.forEach(function(d,i){
  var el=document.createElement('div');
  el.className='f'+(d[4]?' target':'');
  el.style.cssText='background:'+d[0]+';top:'+(i*FH)+'px;';
  if(d[4]){ el.style.boxShadow='0 0 20px rgba(220,200,120,0.35)'; el.onclick=openDoc; }
  el.innerHTML=
    '<div class="f-tab" style="background:'+d[1]+';"></div>'+
    '<div class="f-label-wrap">'+
    '<span class="f-code" style="color:'+(d[4]?'#5a4a30':'rgba(160,130,60,0.6)')+';">'+d[2]+'</span>'+
    '<span class="f-name" style="color:'+(d[4]?'#8a7050':'rgba(140,110,50,0.35)')+';">'+d[3]+'</span>'+
    '</div>';
  area.appendChild(el); els.push(el);
});

function spawnDust(){
  document.querySelectorAll('#intro .dust').forEach(function(d){
    d.style.animation='none'; void d.offsetHeight;
    d.style.animation='df '+(0.45+Math.random()*0.5)+'s ease-out forwards';
  });
}

function flipFiles(){
  var offset=0;
  var slotH=area.clientHeight||600;
  var center=TGT*FH-(slotH/2-FH/2);
  var vel=0;
  function tick(){
    var rem=center-offset;
    if(rem>500){      vel=Math.min(vel+10,90); }
    else if(rem>200){ vel=Math.min(vel+6,90); }
    else if(rem>60){  vel=Math.max(vel*0.85,8); }
    else if(rem>3){   vel=Math.max(rem*0.25,2); }
    else {
      // 급정거 오버슈팅
      var overshoot=vel*0.3;
      offset=center+overshoot;
      els.forEach(function(el,i){ el.style.top=(i*FH-offset)+'px'; });
      setTimeout(function(){
        els.forEach(function(el,i){
          el.style.transition='top 0.18s cubic-bezier(0.25,0.46,0.45,0.94)';
          el.style.top=(i*FH-center)+'px';
        });
        setTimeout(function(){
          els.forEach(function(el,i){ el.style.transition=''; });
          highlightTarget();
        },200);
      },16);
      return;
    }
    offset+=vel;
    els.forEach(function(el,i){ el.style.top=(i*FH-offset)+'px'; });
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function highlightTarget(){
  var tf=els[TGT];
  tf.style.transition='box-shadow 0.6s ease, filter 0.6s ease';
  tf.style.boxShadow='0 0 50px rgba(220,200,120,0.8), 0 0 100px rgba(220,200,100,0.3)';
  tf.style.filter='brightness(1.12)';
  document.getElementById('hint').classList.add('show');
}

ss="section-heading">\n        II. &nbsp; 의학적 소견 &nbsp;/&nbsp; Medical Findings\n        <span class="sec-code">MMC-MED-CLS-01</span>\n      </div>\n\n      <div class="body-text">\n        <p><strong>Diagnosis :</strong> 〔 2형 마력침식 — 만성 침식 / Persistent Erosion, Type II 〕</p>\n        <p>대상의 턱 좌측, 경추 좌측, 쇄골 및 오른쪽 상완골에서 성장이 느린 마강석 결정 발현이 확인됨.\n           <strong>2형 마력침식 2단계</strong>를 진단함.</p>\n      </div>\n\n      <div class="meter-wrap">\n        <div class="meter-label">\n          <span>침식 진행도 &nbsp;/&nbsp; Erosion Progress</span>\n          <span>52 %</span>\n        </div>\n        <div class="meter-track">\n          <div class="meter-fill" id="erosionBar"></div>\n        </div>\n      </div>\n\n      <div class="body-text" style="margin-top:10px;">\n        <p>현재 수치는 즉각적 위험 단계에 해당하지 않으나, 침식 속도에 따라 향후 정기 재진단이 권고됨.</p>\n      </div>\n\n      <div class="note-box">\n        <span class="note-by">※ Addendum — Citrus Knunch (특이점 기록관)</span>\n        턱 좌측의 결정은 마강석 분진의 안면 직접 접촉에 의한 외부 유입으로 추정됨.\n        경추 좌측의 경우 외피 노출 부위와의 연관성이 낮아, 호흡기를 통해 흡입된 분진이\n        체내에서 결정화된 내부 발현 경로가 유력하게 검토됨. 동일 패턴의 사례가 소수 보고된\n        바 있으나 기전이 완전히 규명되지 않아 추가 관찰이 필요함.\n      </div>\n\n      <div class="body-text" style="font-size:10.5px;color:var(--ink-faded);">\n        <p>만일의 인명피해·재산피해 혹은 이에 상응하는 사태 발생 시,\n           <strong>제 47호 마석채굴장 총 책임자 Jonathan &lsquo; Hunk &rsquo; Kaph</strong>에게\n           책임 및 배상 의무가 있음을 명시함.</p>\n      </div>\n    </div>\n\n    <hr class="rule-double" style="margin-top:auto;margin-bottom:0;">\n    <div class="doc-footer" style="border-top:none;margin-top:14px;">\n      <div class="footer-col">MMC-HR-47-Q2FUAT322163 &nbsp;/&nbsp; Magi-ore Mining Concession</div>\n      <div class="footer-col right">— 계속 &nbsp;/&nbsp; Continued —</div>\n    </div>\n    <div class="page-num-watermark">p. 1</div>\n\n  </div><!-- /page1 -->\n\n  <!-- ════ PAGE 2 ════ -->\n  <div class="paper" id="page2">\n\n    <div class="continuation-header">\n      <span>MMC-HR-47-Q2FUAT322163 &nbsp;/&nbsp; Magi-ore Mining Concession</span>\n      <span>RESTRICTED — 관계자 한정</span>\n    </div>\n\n    <!-- III. ARTEFACTS -->\n    <div class="section">\n      <div class="section-heading">\n        III. &nbsp; 소지 마도구 기록 &nbsp;/&nbsp; Registered Artefacts\n        <span class="sec-code">ARTIFACT-LOG</span>\n      </div>\n\n      <div class="artifact-header">\n        청회색 로켓 아뮬렛 &nbsp;/&nbsp; Blue-Grey Locket Amulet\n        <span class="artifact-grade">GRADE&nbsp;3</span>\n      </div>\n\n      <table class="tw-table">\n        <tr><td>Form</td><td><span class="u">청회색 로켓 펜던트</span> (허리춤 소지)</td></tr>\n        <tr><td>Classification</td><td>무저갱 유물로 추정. 역설계 불가능.</td></tr>\n        <tr><td>Acquisition</td><td>불명확 — 발견 당시 소지</td></tr>\n        <tr><td>Confirmed Effect</td><td>착용자를 외부 마력의 영향에서 자유롭게 함.</td></tr>\n        <tr><td>Suspected Effect</td><td>외력 반사 및 물리 방어 효과 — 현재 연구 착수중.<br>\n          <span style="font-size:10px;color:var(--ink-dim);">연구 <em>RSC-02-C</em> / 담당 Vahn Jose</span>\n        </td></tr>\n      </table>\n\n      <div class="note-box" style="margin-top:12px;">\n        <span class="note-by">※ Addendum — Munch Dopell (마도구 평가관)</span>\n        해당 아뮬렛의 외부 마력 차단 효과가 대상의 2형 마력침식 진행 속도에 어떠한 영향을\n        미쳤는지에 대한 검토가 필요하다. 아뮬렛이 침식 억제 효과를 부수적으로 발휘하고 있을\n        가능성을 배제할 수 없다. 관련 분석은 <em>RSC-02-C</em> (담당: Vahn Jose) 하 진행 예정.\n      </div>\n    </div>\n\n    <!-- IV. ORIGIN -->\n    <div class="section">\n      <div class="section-heading">\n        IV. &nbsp; 출신지 조사 기록 &nbsp;/&nbsp; Origin Survey\n        <span class="sec-code">ORIGIN-SURVEY</span>\n      </div>\n\n      <div class="body-text">\n        <p><strong>기동요새 하층 — <span class="u">아텔그라드</span></strong> :\n           술, 약, 그리고 기계의 도시. 기동요새의 최하층부에 위치한 자치 구역으로,\n           요새 상층부의 행정력이 거의 미치지 않는 지역이다. 밀수, 불법 마도구 거래,\n           비공인 의술 등이 성행하며, 거주민 대부분이 정식 호적 등록 없이 생활한다.\n        </p>\n        <p>대상은 해당 지역 출신으로 확인되나, 성장 배경 및 기억이 현저히 불명확한 것으로\n           파악됨. 유입 경위에 관해서는, 당시 아텔그라드와 외부를 잇는 유일한 물자 유통망을 통한\n         밀입국 가능성이 유력하게 검토되고 있으나, 해당 루트 특성상 관계자 확인이 구조적으로\n         불가하여 단정은 보류 중이다.\n        </p>\n      </div>\n\n      <div class="indent-block">\n        이에 따라 <strong>제 21과 치안수비대</strong>에 아텔그라드 실태 조사를 제안하였으나,<br>\n        해당 건은 &nbsp;<span class="tag tag-reject">기각 / REJECTED</span>&nbsp; 되었음.<br><br>\n        <span style="font-size:10.5px;">사유: 아텔그라드는 기동요새 자치 구역 협약에 의거,\n        &nbsp;<span class="tag tag-warn">조사 제한 구역</span>&nbsp;\n        으로 지정되어 있어 관할권 행사 불가.</span>\n      </div>\n    </div>\n\n    <!-- V. EVALUATION -->\n    <div class="section">\n      <div class="section-heading">\n        V. &nbsp; 인사 평가 의견 &nbsp;/&nbsp; Personnel Evaluation\n        <span class="sec-code">ADM-03-C</span>\n      </div>\n\n      <div class="opinion-block">\n        마강석 채굴은 과거부터 이루어져 온 유서 깊은 작업이다. 온갖 위험이 도사리는 끔찍한 작업이기도 하다.\n        해당 인적 자원은 채굴 작업에 상당히 부적격한 신체·정신 상태를 보유하고 있다.\n        어린 체구, 겁이 많은 성격으로, 폭파 작업 때마다 구석에서 극도의 공포 반응을 보이는 것이\n        반복적으로 관찰되었다.<br><br>\n\n        본 권리사에서는 해당 자원의 <strong>조기 제거</strong>를 복수 차례 제안한 바 있으나,\n        그때마다 제 47 채굴장 인부들로부터 협박·위협, 심한 경우 실제 물리적 충돌까지 발생하여\n        처분이 매번 무산되었다. 그렇다고 제 47 채굴장의 유치권을 포기하는 것은 경영상 상당한\n        손실을 초래한다.<br><br>\n\n        현 시점에서 해당 자원을 <strong>계륵</strong>으로 평가한다.\n        기회가 주어진다면 언제든 제거를 재추진할 예정이다.\n        그 전까지 채굴장에서 납득 가능한 성과를 보여주길 바란다.<br><br>\n\n        <span style="font-size:9.5px;color:var(--ink-ghost);">— 인사담당관 &nbsp; Donald Mcmilinum</span>\n      </div>\n\n      <div style="position:relative;">\n        <!-- MMC STAMP — overlapping bottom-right of eval table -->\n        <div style="\n          position: absolute;\n          bottom: 6px; right: 10px;\n          width: 106px; height: 106px;\n          border: 3px solid var(--red-stamp);\n          display: flex; flex-direction: column;\n          align-items: center; justify-content: center;\n          gap: 4px;\n          transform: rotate(-5deg);\n          opacity: 0.50;\n          pointer-events: none;\n          z-index: 5;\n        ">\n          <div style="position:absolute;inset:5px;border:1px solid var(--red-stamp);"></div>\n          <span style="font-family:\'Special Elite\',cursive;font-size:26px;color:var(--red-stamp);letter-spacing:0.12em;line-height:1;position:relative;z-index:1;">M.M.C.</span>\n          <span style="font-family:\'Courier Prime\',monospace;font-size:7px;color:var(--red-stamp);letter-spacing:0.16em;text-transform:uppercase;position:relative;z-index:1;">official documents</span>\n        </div>\n      <table class="eval-table">\n        <tr>\n          <td>업무 적합도</td>\n          <td>부적격 — 어린 체구와 공포 반응으로 채굴 작업 신체·정신 기준 미달. 발파 시 극도의 공포 반응 반복.</td>\n        </tr>\n        <tr>\n          <td>처분 가능 여부</td>\n          <td>제거 목표, 현재 불가 — 제 47 채굴장 인부들의 조직적 반발 (협박·위협 및 실제 물리적 충돌까지 발생)로 인해 복수 차례 제거 시도 무산. 기회 확보 시 재추진 예정.</td>\n        </tr>\n        <tr>\n          <td>존치 사유</td>\n          <td>제 47 채굴장 유치권 유지. 인부 전체 잔류 의사 기인. 유치권 포기 시 경영상 손실 상당.</td>\n        </tr>\n        <tr>\n          <td>종합 처우 방침</td>\n          <td>현상 유지. 행정 제거 절차 재추진 기회 모색 중 (<em>ADM-03-C</em> 등재 → 집행 시 <em>SPC-02</em> 연계). 내부 반발 모니터링 병행.</td>\n        </tr>\n      </table>\n      </div><!-- /stamp+table wrapper -->\n\n    <hr class="rule-double" style="margin-top:18px;margin-bottom:12px;">\n    <div class="doc-footer">\n      <div class="footer-col">\n        MMC-HR-47-Q2FUAT322163<br>\n        마석 채굴 권리사 / Magi-ore Mining Concession\n      </div>\n      <div class="footer-col right">\n        UNAUTHORIZED ACCESS PROHIBITED<br>\n        무단 열람 및 배포 금지\n      </div>\n    </div>\n    <div class="page-num-watermark">p. 2</div>\n\n  </div><!-- /page2 -->\n\n</div><!-- /flipbook -->\n\n<!-- LEFT / RIGHT CLICK ZONES -->\n<div id="zoneLeft" onclick="goToPage(1)" style="\n  position: fixed;\n  left: 0; top: 0; bottom: 0;\n  width: 15%;\n  cursor: w-resize;\n  z-index: 50;\n  display: flex;\n  align-items: center;\n  justify-content: flex-start;\n  padding-left: 12px;\n"></div>\n\n<div id="zoneRight" onclick="goToPage(2)" style="\n  position: fixed;\n  right: 0; top: 0; bottom: 0;\n  width: 15%;\n  cursor: e-resize;\n  z-index: 50;\n  display: flex;\n  align-items: center;\n  justify-content: flex-end;\n  padding-right: 12px;\n"></div>\n\n<!-- PAGE ARROWS (subtle) -->\n<div id="arrowLeft" onclick="goToPage(1)" style="\n  position: fixed;\n  left: 16px; top: 50%;\n  transform: translateY(-50%);\n  font-family: \'Courier Prime\', monospace;\n  font-size: 18px;\n  color: rgba(200,180,130,0.25);\n  cursor: pointer;\n  z-index: 51;\n  user-select: none;\n  transition: color 0.2s;\n  pointer-events: none;\n">◂</div>\n\n<div id="arrowRight" onclick="goToPage(2)" style="\n  position: fixed;\n  right: 16px; top: 50%;\n  transform: translateY(-50%);\n  font-family: \'Courier Prime\', monospace;\n  font-size: 18px;\n  color: rgba(200,180,130,0.4);\n  cursor: pointer;\n  z-index: 51;\n  user-select: none;\n  transition: color 0.2s;\n  pointer-events: none;\n">▸</div>';

function openDoc(){
  var overlay=document.getElementById('fadeOverlay');
  overlay.classList.add('fade-in');

  setTimeout(function(){
    // 인트로 제거
    var intro=document.getElementById('intro');
    if(intro && intro.parentNode) intro.parentNode.removeChild(intro);

    // body 스타일 교체
    document.body.style.cssText=[
      'margin:0','padding:0',
      'background:#4a3820',
      'background-image:radial-gradient(ellipse at 25% 15%,#5e4a2a 0%,transparent 55%),radial-gradient(ellipse at 78% 88%,#3a2c10 0%,transparent 50%)',
      'height:100vh','overflow:hidden',
      'font-family:Courier Prime,Courier New,monospace',
      'display:flex','flex-direction:column',
      'align-items:center','justify-content:center',
      'padding:14px 60px','user-select:none'
    ].join(';');

    // 문서 주입
    var doc=document.getElementById('doc');
    doc.innerHTML=DOC_HTML;
    doc.style.display='contents';

    // 다음 프레임에 throwIn 애니메이션 + 페이드아웃
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        // 페이드 아웃
        overlay.style.transition='opacity 0.5s ease';
        overlay.style.opacity='0';
        setTimeout(function(){ overlay.style.pointerEvents='none'; },500);

        // throwIn — flipbook에 적용
        var flipbook=document.getElementById('flipbook');
        if(flipbook){
          flipbook.style.animation='none';
          void flipbook.offsetHeight;
          flipbook.style.transformOrigin='50% 80%';
          flipbook.style.animation='throwIn 0.65s cubic-bezier(0.22,0.61,0.36,1) both';
        }

        initDoc();
      });
    });
  }, 600);
}

function initDoc(){
  var attempts=0;
  function tryInit(){
    var p1=document.getElementById('page1');
    if(!p1 && attempts<30){ attempts++; setTimeout(tryInit,80); return; }
    var bar=document.getElementById('erosionBar');
    if(bar) setTimeout(function(){ bar.style.width='52%'; },600);
    var p2=document.getElementById('page2');
    if(p2){
      p2.style.transform='translateX(20px) rotate(0.9deg) scale(0.975)';
      p2.style.opacity='0.45';
      p2.style.filter='brightness(0.68)';
      p2.style.zIndex='1';
      p2.style.pointerEvents='none';
    }
    var zR=document.getElementById('zoneRight');
    if(zR){ zR.style.cursor='e-resize'; zR.onclick=function(){ goToPage(2); }; }
    var aL=document.getElementById('arrowLeft');
    if(aL) aL.style.color='rgba(200,180,130,0.08)';
    var aR=document.getElementById('arrowRight');
    if(aR) aR.style.color='rgba(200,180,130,0.4)';
  }
  tryInit();
}


  let currentPage = 1;

  let turning = false;

  function goToPage(n) {
    if (n === currentPage || turning) return;
    turning = true;
    currentPage = n;

    // 페이지 넘기는 소리
    const snd = document.getElementById('pageFlipSound');
    if (snd) { snd.currentTime = 0; snd.play(); }

    const flipbook  = document.getElementById('flipbook');
    const pageLabel = document.getElementById('page-label');
    const dot1      = document.getElementById('dot1');
    const dot2      = document.getElementById('dot2');
    const arrowL    = document.getElementById('arrowLeft');
    const arrowR    = document.getElementById('arrowRight');
    const zoneL     = document.getElementById('zoneLeft');
    const zoneR     = document.getElementById('zoneRight');
    const p1        = document.getElementById('page1');
    const p2        = document.getElementById('page2');

    if (n === 2) {
      // 1→2: page1을 오른쪽 아래로 쓸어내기
      // 먼저 page1에 turning 클래스로 살짝 들리는 효과
      p1.style.transition = 'transform 0.55s cubic-bezier(0.4,0,0.15,1), opacity 0.45s ease, filter 0.45s ease';
      p1.style.transform  = 'translateX(62%) translateY(28%) rotate(16deg)';
      p1.style.opacity    = '0';
      p1.style.filter     = 'brightness(0.4)';
      p1.style.zIndex     = '1';

      p2.style.transition = 'transform 0.55s cubic-bezier(0.4,0,0.15,1), opacity 0.45s ease, filter 0.45s ease';
      p2.style.transform  = 'translateX(0) rotate(0.8deg) scale(1)';
      p2.style.opacity    = '1';
      p2.style.filter     = 'none';
      p2.style.zIndex     = '2';
      p2.style.pointerEvents = 'auto';

      pageLabel.textContent = 'Page 2 / 2';
      dot1.classList.remove('active');
      dot2.classList.add('active');
      arrowL.style.color = 'rgba(200,180,130,0.4)';
      arrowR.style.color = 'rgba(200,180,130,0.08)';
      zoneL.onclick = () => goToPage(1);
      zoneL.style.cursor = 'w-resize';
      zoneR.onclick = null;
      zoneR.style.cursor = 'default';

    } else {
      // 2→1: page1이 아래에서 위로 올라오고 page2는 fade out
      p2.style.transition = 'opacity 0.3s ease, filter 0.3s ease, transform 0.3s ease';
      p2.style.opacity    = '0';
      p2.style.filter     = 'brightness(0.4)';
      p2.style.transform  = 'translateX(60px) scale(0.97)';
      p2.style.zIndex     = '1';
      p2.style.pointerEvents = 'none';

      // page1을 먼저 아래쪽에 대기시키고
      p1.style.transition = 'none';
      p1.style.transform  = 'translateY(30px)';
      p1.style.opacity    = '0';
      p1.style.zIndex     = '2';

      // 다음 프레임에서 올라오게
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          p1.style.transition = 'transform 0.45s cubic-bezier(0.2,0,0.2,1), opacity 0.4s ease, filter 0.4s ease';
          p1.style.transform  = 'translateX(0) translateY(0) rotate(-0.6deg)';
          p1.style.opacity    = '1';
          p1.style.filter     = 'none';
        });
      });

      pageLabel.textContent = 'Page 1 / 2';
      dot1.classList.add('active');
      dot2.classList.remove('active');
      arrowL.style.color = 'rgba(200,180,130,0.08)';
      arrowR.style.color = 'rgba(200,180,130,0.4)';
      zoneL.onclick = null;
      zoneL.style.cursor = 'default';
      zoneR.onclick = () => goToPage(2);
      zoneR.style.cursor = 'e-resize';

      // page2를 천천히 peek 위치로 페이드인
      setTimeout(() => {
        p2.style.transition = 'transform 0.5s cubic-bezier(0.2,0,0.2,1), opacity 0.5s ease, filter 0.5s ease';
        p2.style.transform  = 'translateX(20px) rotate(0.9deg) scale(0.975)';
        p2.style.opacity    = '0.45';
        p2.style.filter     = 'brightness(0.68)';
        p2.style.zIndex     = '1';
      }, 300);
    }

    // 애니메이션 끝나면 잠금 해제
    setTimeout(() => { turning = false; }, 620);
  }

  // erosion bar on load
  

  // keyboard nav
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goToPage(2);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goToPage(1);
  });

</script>
